<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Echo - Share ideas. Build conversations.">
  <meta name="theme-color" content="#1d9bf0">
  <title>Login / Echo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card" role="form" aria-labelledby="login-heading">
      <header class="login-header">
        <a href="index.html" class="logo-link" aria-label="Echo Home">
          <div class="logo-mark" aria-hidden="true">E</div>
        </a>
        <h1 id="login-heading">Sign in to Echo</h1>
        <p class="login-tagline">Share ideas. Build conversations.</p>
      </header>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email address</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon" aria-hidden="true"></i>
            <input type="email" id="login-email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email" aria-required="true" aria-describedby="email-error">
          </div>
          <span class="error-message" id="email-error" role="alert" aria-live="assertive"></span>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon" aria-hidden="true"></i>
            <input type="password" id="login-password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" aria-required="true" aria-describedby="password-error">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" title="Show password">
              <i class="bi bi-eye-slash" id="password-toggle-icon" aria-hidden="true"></i>
            </button>
          </div>
          <span class="error-message" id="password-error" role="alert" aria-live="assertive"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="remember">
            <span class="checkbox-custom" aria-hidden="true"></span>
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="btn-login">Sign In</button>
      </form>

      <footer class="login-footer">
        <p>Don't have an account? <a href="#" id="signup-link">Sign up</a></p>
      </footer>
    </div>
  </div>

  <div class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
