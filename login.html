<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Sign in to Echo - Share ideas. Build conversations.">
  <meta name="theme-color" content="#1a7a5e">
  <title>Sign in to Echo</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <a href="#login-content" class="skip-link">Skip to login form</a>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>
  
  <div class="login-page" id="login-content">
    <button class="login-theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    
    <div class="login-card">
      <div class="login-card__logo">
        <svg class="login-card__logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
          <path d="M8 12l2 2 4-4"></path>
        </svg>
        <span class="login-card__logo-text">Echo</span>
      </div>
      
      <h1 class="login-card__title">Sign in to Echo</h1>
      <p class="login-card__subtitle">Share ideas. Build conversations.</p>
      
      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <div class="form-input-wrapper">
            <input 
              type="email" 
              id="login-email" 
              class="form-input" 
              placeholder="you@example.com" 
              autocomplete="email"
              aria-describedby="login-email-error"
              required
            >
          </div>
          <div class="form-error" id="login-email-error" role="alert" aria-live="assertive" style="display: none;">
            <svg class="form-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Please enter a valid email address</span>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="form-input-wrapper">
            <input 
              type="password" 
              id="login-password" 
              class="form-input" 
              placeholder="Enter your password" 
              autocomplete="current-password"
              aria-describedby="login-password-error"
              required
              minlength="6"
            >
            <button type="button" class="form-input__icon" id="toggle-password" aria-label="Toggle password visibility" tabindex="-1">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="form-error" id="login-password-error" role="alert" aria-live="assertive" style="display: none;">
            <svg class="form-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Password must be at least 6 characters</span>
          </div>
        </div>
        
        <div class="form-options">
          <label class="form-checkbox-wrapper">
            <input type="checkbox" class="form-checkbox" id="remember-me" aria-label="Remember me">
            <span class="form-checkbox-label">Remember me</span>
          </label>
          <a href="#" class="form-link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn-login" id="login-submit">
          <span>Sign In</span>
        </button>
      </form>
      
      <div class="login-divider">or</div>
      
      <div class="login-footer">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>
  
  <script src="js/darkMode.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
